<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Nativa prototype">
        <header class="topbar">
          <div class="brand-block">
            <div class="brand-row">
              <img src="/nativa.png" alt="" class="brand-mark">
              <h1>NATIVA</h1>
            </div>
            <div class="connection-line">
              <span id="languagePair">RU -> EN</span>
              <span class="status-badge" id="connectionBadge">
                <span></span>
                <b>Checking</b>
              </span>
            </div>
          </div>

          <nav class="mode-switch" aria-label="Interface mode">
            <button class="active" id="voiceModeButton" type="button">Voice</button>
            <button id="debugModeButton" type="button">Debug</button>
          </nav>
        </header>

        <section class="view active" id="voiceView" aria-label="Voice Interface">
          <div class="visualizer-shell">
            <div class="visualizer" id="voiceVisualizer" aria-label="Voice visualizer"></div>
            <div class="state-line">
              <span id="pipelineState">idle</span>
              <span id="activeSpeaker">idle</span>
            </div>
          </div>

          <section class="voice-controls" aria-label="Voice controls">
            <button class="primary-button" id="recordButton" type="button">
              <span class="record-dot"></span>
              <span id="recordLabel">START</span>
            </button>
            <div class="vad-readout">VAD: <strong id="vadState">silent</strong></div>
            <div class="language-controls">
              <label>
                <span>From</span>
                <select id="sourceLang">
                  <option value="Russian" selected>RU</option>
                  <option value="English">EN</option>
                  <option value="Uzbek">UZ</option>
                </select>
              </label>
              <button class="icon-button" id="swapButton" type="button" title="Swap languages" aria-label="Swap languages">↔</button>
              <label>
                <span>To</span>
                <select id="targetLang">
                  <option value="English" selected>EN</option>
                  <option value="Russian">RU</option>
                  <option value="Uzbek">UZ</option>
                </select>
              </label>
            </div>
          </section>

          <section class="replica-history" aria-label="Replica history">
            <div class="section-head">
              <h2>ReplicaHistory</h2>
              <button id="clearHistory" type="button">Clear</button>
            </div>
            <ol id="historyList">
              <li class="empty">No replicas yet.</li>
            </ol>
          </section>
        </section>

        <section class="view debug-grid" id="debugView" aria-label="Debug Console">
          <section class="latency-panel" aria-label="Latency table">
            <div class="section-head">
              <h2>LatencyTable</h2>
              <div class="debug-actions">
                <button id="runKTests" type="button">Run K-Tests</button>
                <button id="exportCsv" type="button">Export CSV</button>
              </div>
            </div>
            <div class="summary-grid">
              <div><span>STT</span><strong id="metricStt">-</strong></div>
              <div><span>Trans</span><strong id="metricTranslate">-</strong></div>
              <div><span>TTS</span><strong id="metricTts">-</strong></div>
              <div><span>Total</span><strong id="metricTotal">-</strong></div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Case</th>
                    <th>STT</th>
                    <th>Trans</th>
                    <th>TTS</th>
                    <th>Total</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="latencyRows">
                  <tr><td colspan="7">No runs yet.</td></tr>
                </tbody>
                <tfoot id="latencyStats"></tfoot>
              </table>
            </div>
          </section>

          <section class="console-panel" aria-label="Debug log">
            <div class="section-head">
              <h2>DebugConsole</h2>
              <button id="clearLog" type="button">Clear</button>
            </div>
            <div class="debug-console" id="debugConsole"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
