<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell app">
      <aside class="sidebar" aria-label="Nativa navigation">
        <div class="sidebar-top">
          <div class="brand-row">
            <div class="logo-mark">N</div>
            <h1>NATIVA</h1>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Primary">
          <button class="nav-item active" id="dashboardHomeButton" type="button"><span>🏠</span> Home</button>
          <button class="nav-item" id="recentNavButton" type="button"><span>🕐</span> Recent</button>
          <button class="nav-item" id="filesNavButton" type="button"><span>📁</span> My files</button>
        </nav>

        <section class="sidebar-recents" aria-label="Recent sessions">
          <h2>Recent</h2>
          <div id="sidebarRecentSessions"></div>
        </section>

        <div class="user-block">
          <div class="avatar">G</div>
          <div>
            <strong>Guest</strong>
            <span class="status-badge" id="connectionBadge">
              <span></span>
              <b>Checking</b>
            </span>
          </div>
        </div>
      </aside>

      <section class="screen dashboard-screen active" id="dashboardView" aria-label="Dashboard">
        <header class="dashboard-header">
          <button class="new-project-button" id="newProjectButton" type="button">+ New Project</button>
        </header>

        <section class="dashboard-hero" aria-label="Project starters">
          <h2>What do you want to do?</h2>
          <div class="project-card-grid">
            <button class="project-card" type="button" data-project-kind="voice">
              <span class="card-icon">🎙</span>
              <strong>Voice your speech</strong>
              <p>Speak and hear yourself translated in real time</p>
            </button>
            <button class="project-card" type="button" data-project-kind="conversation">
              <span class="card-icon">↔</span>
              <strong>Have a conversation</strong>
              <p>Talk with someone who speaks a different language</p>
            </button>
            <button class="project-card" type="button" data-project-kind="listen">
              <span class="card-icon">👂</span>
              <strong>Hear what others say</strong>
              <p>Listen and read translations as people speak around you</p>
            </button>
          </div>
        </section>

        <section class="recent-sessions-panel" aria-label="Recent sessions">
          <div class="section-head">
            <h2>Recent sessions</h2>
          </div>
          <div class="recent-session-list" id="recentSessionsList"></div>
        </section>
      </section>

      <section class="screen project-screen" id="projectView" aria-label="Project View">
        <header class="project-topbar">
          <button class="back-button" id="backButton" type="button">← Back</button>
          <input class="session-title" id="sessionTitle" value="Untitled session" aria-label="Session title">
          <div class="project-actions">
            <span class="language-pair" id="languagePair">RU → EN</span>
            <label>
              <span>From</span>
              <select id="sourceLang">
                <option value="Russian" selected>RU</option>
                <option value="English">EN</option>
                <option value="Uzbek">UZ</option>
              </select>
            </label>
            <button class="icon-button" id="swapButton" type="button" title="Swap languages" aria-label="Swap languages">↔</button>
            <label>
              <span>To</span>
              <select id="targetLang">
                <option value="English" selected>EN</option>
                <option value="Russian">RU</option>
                <option value="Uzbek">UZ</option>
              </select>
            </label>
            <button class="debug-toggle" id="debugModeButton" type="button">Debug</button>
          </div>
        </header>

        <section class="project-main active" id="voiceView" aria-label="Voice Interface">
          <section class="visualizer-shell visualizer-section" aria-label="Voice visualizer">
            <div class="visualizer visualizer-container" id="voiceVisualizer"></div>
            <p class="viz-status"><span id="pipelineState">idle</span><span id="activeSpeaker">idle</span></p>
          </section>

          <section class="voice-controls control-bar" aria-label="Voice controls">
            <div class="control-left">
              <span class="vad-label">VAD:</span>
              <strong class="vad-value silent" id="vadState">silent</strong>
            </div>
            <div class="control-center">
              <button class="primary-button btn-start" id="recordButton" type="button">
                <span id="recordLabel">START</span>
              </button>
            </div>
            <div class="control-right">
              <button class="clone-button" id="voiceCloneButton" type="button" title="Record voice sample">🎙 Clone voice</button>
              <span class="voice-id-status" id="voiceIdStatus">No cloned voice</span>
            </div>
          </section>

          <section class="text-tts-panel" aria-label="Text to speech">
            <textarea id="ttsTextInput" rows="2" placeholder="Type text to speak with cloned voice"></textarea>
            <button class="speak-button" id="speakTextButton" type="button">Speak</button>
          </section>

          <section class="replica-history replica-section" aria-label="Replica history">
            <div class="section-head replica-header">
              <h2>Replica History</h2>
              <button id="clearHistory" type="button">Clear</button>
            </div>
            <ol id="historyList">
              <li class="empty">No replicas yet.</li>
            </ol>
          </section>
        </section>

        <section class="debug-panel" id="debugView" aria-label="Debug Console">
          <section class="latency-panel" aria-label="Latency table">
            <div class="section-head">
              <h2>LatencyTable</h2>
              <div class="debug-actions">
                <button id="runKTests" type="button">Run K-Tests</button>
                <button id="exportCsv" type="button">Export CSV</button>
              </div>
            </div>
            <div class="summary-grid">
              <div><span>STT</span><strong id="metricStt">-</strong></div>
              <div><span>Trans</span><strong id="metricTranslate">-</strong></div>
              <div><span>TTS</span><strong id="metricTts">-</strong></div>
              <div><span>Total</span><strong id="metricTotal">-</strong></div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Case</th>
                    <th>STT</th>
                    <th>Trans</th>
                    <th>TTS</th>
                    <th>Total</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="latencyRows">
                  <tr><td colspan="7">No runs yet.</td></tr>
                </tbody>
                <tfoot id="latencyStats"></tfoot>
              </table>
            </div>
          </section>

          <section class="console-panel" aria-label="Debug log">
            <div class="section-head">
              <h2>DebugConsole</h2>
              <button id="clearLog" type="button">Clear</button>
            </div>
            <div class="debug-console" id="debugConsole"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
